<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Violencia Intrafamiliar Bolivia</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Guía de Violencia Intrafamiliar (Edición 2023)</h1>
        <p class="subtitle">Responde cada pregunta y revisa la retroalimentación.</p>
        <div id="quiz-container"></div>
        <div id="resultado-final" style="display:none; margin-top:20px; padding:16px; border-radius:14px; background:#fff; border:1px solid #d9dfe3; font-weight:700;"></div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="btn">Volver al menú</a>
    </nav>

    <script>
        const quizData = [
            { q: "1. ¿Cuál es el objetivo principal de la presente guía del Ministerio de Educación?", options: ["a) Aplicar sanciones administrativas a padres.", "b) Orientar la actuación para garantizar identificación temprana y referencia oportuna.", "c) Reemplazar protocolos de violencia sexual.", "d) Establecer el currículo de prevención."], correct: 1, retro: "Retroalimentación: La guía busca orientar la actuación de la comunidad educativa para una detección y referencia oportuna (Fuente [1])." },
            { q: "2. Sobre la naturaleza de este documento, es correcto afirmar que:", options: ["a) Es una ley penal obligatoria.", "b) Tiene un carácter orientador y no es un documento normativo.", "c) Define sanciones de retiro docente.", "d) Es el reglamento de faltas actualizado."], correct: 1, retro: "Retroalimentación: El documento es orientador; el procedimiento normativo está en los protocolos específicos (Fuente [6])." },
            { q: "3. Según el informe de 2020, ¿qué cantidad de niños sufren algún tipo de maltrato en el mundo?", options: ["a) Diez millones.", "b) Cien millones.", "c) Mil millones.", "d) Quinientos millones."], correct: 2, retro: "Retroalimentación: De mil millones de niños maltratados, 300 millones son menores de 4 años (Fuente [6])." },
            { q: "4. ¿Cuántas veces más probabilidades de reproducir abusos en la adultez tienen quienes sufrieron abuso sexual en su infancia?", options: ["a) 2 veces.", "b) 5 veces.", "c) 14 veces.", "d) 50 veces."], correct: 2, retro: "Retroalimentación: El estudio mundial estima una probabilidad 14 veces mayor en la adultez (Fuente [6])." },
            { q: "5. ¿Cómo se define la 'Violencia en el ámbito familiar' en esta guía?", options: ["a) Desacuerdo verbal entre hermanos.", "b) Maltrato deliberado donde miembros con mayor poder abusan de otros con menor poder.", "c) Solo agresiones físicas visibles.", "d) Abandono accidental."], correct: 1, retro: "Retroalimentación: Se basa en el abuso de poder y puede ser por acción, omisión o supresión (Fuente [7])." },
            { q: "6. De acuerdo a la Ley N° 548, la violencia ocurre cuando los tutores:", options: ["a) Exigen hacer tareas.", "b) Ponen en peligro la integridad por abuso de medios correctivos o trabajo excesivo.", "c) Envían al niño a escuela fiscal.", "d) No asisten a reuniones."], correct: 1, retro: "Retroalimentación: El peligro surge del abuso disciplinario o imposición de trabajo inadecuado (Fuente [8, 9])." },
            { q: "7. La violencia contra la niñez puede clasificarse por su comportamiento en:", options: ["a) Leve, grave y gravísima.", "b) Intencional y accidental.", "c) Acción, omisión y supresión.", "d) Física y verbal."], correct: 2, retro: "Retroalimentación: Esta clasificación abarca tanto actos directos como falta de cuidados (Fuente [10])." },
            { q: "8. La violencia física se caracteriza por acciones intencionadas que:", options: ["a) Solo causan dolor emocional.", "b) Causan daño corporal no accidental o riesgo de enfermedad.", "c) Son parte necesaria de la disciplina.", "d) Ocurren solo entre pares."], correct: 1, retro: "Retroalimentación: Incluye lesiones físicas reales que van más allá de una irritación leve (Fuente [2])." },
            { q: "9. ¿Qué constituye específicamente la 'Violencia Psicológica'?", options: ["a) Golpe sin marca.", "b) Acto intencionado para socavar la autovaloración del menor.", "c) Falta de alimentos.", "d) Exceso de tareas."], correct: 1, retro: "Retroalimentación: Se manifiesta como hostilidad verbal, burlas y amenazas de abandono (Fuente [2])." },
            { q: "10. Evitar el contacto o cercanía minimizando iniciativas de apego se considera:", options: ["a) Técnica de independencia.", "b) Conducta de abandono y rechazo (Psicológica).", "c) Disciplina positiva.", "d) Falta de recursos."], correct: 1, retro: "Retroalimentación: Anular las iniciativas de interacción daña el desarrollo emocional (Fuente [2])." },
            { q: "11. El tipo de violencia que genera más daño y puede ser incesto o vejación es:", options: ["a) Física.", "b) Explotación laboral.", "c) Sexual.", "d) Negligencia."], correct: 2, retro: "Retroalimentación: La violencia sexual utiliza al menor como objeto de estimulación (Fuente [2])." },
            { q: "12. Según la tabla de tipologías, la pena máxima por Violación es de:", options: ["a) 5 años.", "b) 10 años.", "c) 15 años.", "d) 30 años."], correct: 2, retro: "Retroalimentación: La tabla 1 establece 15 años de privación de libertad por este delito (Fuente [3])." },
            { q: "13. El abuso sexual contra menores de edad tiene una pena establecida de:", options: ["a) 1 a 3 años.", "b) 10 a 15 años.", "c) Trabajo comunitario.", "d) Multas."], correct: 1, retro: "Retroalimentación: El Artículo 308 bis especifica este rango cuando la víctima es NNA (Fuente [11])." },
            { q: "14. ¿Qué es el 'Estupro' según la tipología legal?", options: ["a) Violencia física.", "b) Relaciones con menores de 14 a 17 años mediante engaño o seducción.", "c) Pornografía infantil.", "d) Abandono."], correct: 1, retro: "Retroalimentación: La pena máxima por este delito es de 6 años (Fuente [11])." },
            { q: "15. Es una manifestación de violencia sexual sin contacto físico:", options: ["a) Toqueteos.", "b) Masturbarse delante de niños/as.", "c) Forzar toques al agresor.", "d) Incesto."], correct: 1, retro: "Retroalimentación: Exponer al menor a actos sexuales es violencia sexual (Fuente [12])." },
            { q: "16. Espiar a un estudiante en el baño o mientras se cambia es:", options: ["a) Descuido del regente.", "b) Manifestación de violencia sexual.", "c) Falta leve.", "d) Curiosidad natural."], correct: 1, retro: "Retroalimentación: Se tipifica como una forma de acoso u hostigamiento sexual (Fuente [13])." },
            { q: "17. El trabajo infantil es 'Explotación Laboral' cuando:", options: ["a) El niño limpia su cuarto.", "b) Impide el acceso a la educación o atenta contra la dignidad.", "c) Recibe propina.", "d) Ayuda los fines de semana."], correct: 1, retro: "Retroalimentación: La Ley 548 identifica factores como estrés físico y privación educativa (Fuente [14])." },
            { q: "18. La 'Violencia por omisión y supresión' incluye:", options: ["a) Golpes con chicote.", "b) Gritos e insultos.", "c) Negligencia o abandono.", "d) Acoso entre pares."], correct: 2, retro: "Retroalimentación: Es la omisión de responsabilidades básicas para el desarrollo (Fuente [15])." },
            { q: "19. ¿Qué dificulta identificar la negligencia?", options: ["a) Deja marcas físicas.", "b) Es maltrato pasivo y se confunde con falta de recursos.", "c) El niño se queja.", "d) Ocurre solo en clases altas."], correct: 1, retro: "Retroalimentación: Es vital diferenciar negligencia de carencia material por pobreza (Fuente [15])." },
            { q: "20. Una señal emocional a corto plazo de violencia es:", options: ["a) Deseo de ser presidente.", "b) Sentimientos de culpa e impotencia.", "c) Mejora de notas.", "d) Exceso de apetito."], correct: 1, retro: "Retroalimentación: Las víctimas suelen culparse por los hechos de violencia (Fuente [4])." },
            { q: "21. ¿Qué conducta regresiva es señal de maltrato?", options: ["a) Leer antes de tiempo.", "b) Chuparse el dedo o enuresis.", "c) Jugar fútbol.", "d) Pedir más tarea."], correct: 1, retro: "Retroalimentación: El trauma provoca retrocesos a etapas ya superadas (Fuente [4])." },
            { q: "22. En la adolescencia, una consecuencia conductual frecuente es:", options: ["a) Puntualidad.", "b) Riesgo de consumo de drogas y conductas delictivas.", "c) Participación sindical.", "d) Mejora comunicación."], correct: 1, retro: "Retroalimentación: Se busca evasión o se replican patrones de agresión (Fuente [16])." },
            { q: "23. El fracaso o abandono escolar es una consecuencia a:", options: ["a) Corto plazo.", "b) Mediano y largo plazo.", "c) Nivel inicial solamente.", "d) Falta de capacidad."], correct: 1, retro: "Retroalimentación: El impacto acumulado deteriora el rendimiento escolar (Fuente [17, 18])." },
            { q: "24. ¿Qué alteración cognitiva a largo plazo produce la violencia?", options: ["a) Memoria fotográfica.", "b) Alteración en funciones ejecutivas (memoria, autocontrol).", "c) Diálogo constructivo.", "d) Hiperenfoque."], correct: 1, retro: "Retroalimentación: El estrés tóxico daña la flexibilidad cognitiva (Fuente [17])." },
            { q: "25. Factor de riesgo individual en el agresor:", options: ["a) Trabajo estable.", "b) Reducida capacidad de control de impulsos y crianza violenta.", "c) Zona urbana.", "d) Título universitario."], correct: 1, retro: "Retroalimentación: Características de personalidad influyen en el maltrato (Fuente [19])." },
            { q: "26. Factor de riesgo comunitario:", options: ["a) Familia desintegrada.", "b) Embarazo adolescente.", "c) Falta de satisfacción de necesidades básicas y acceso a servicios.", "d) Bajo rendimiento."], correct: 2, retro: "Retroalimentación: El entorno precario genera estrés detonante de violencia (Fuente [20])." },
            { q: "27. ¿Por qué el castigo físico es ineficaz?", options: ["a) Gasta energía.", "b) Viola derechos y enseña que la violencia resuelve conflictos.", "c) Niños se acostumbran.", "d) Chicotes de mala calidad."], correct: 1, retro: "Retroalimentación: Enseña a persuadir mediante el miedo, no la razón (Fuente [21])." },
            { q: "28. Diferencia entre educación y castigo:", options: ["a) Ninguna.", "b) Educación busca autonomía; castigo depende de decisiones externas.", "c) Castigo es más rápido.", "d) Educación es solo escolar."], correct: 1, retro: "Retroalimentación: El castigo impide que el menor reflexione sobre consecuencias (Fuente [22])." },
            { q: "29. Si el estudiante no encuentra a alguien en quien confiar:", options: ["a) Se resuelve solo.", "b) La violencia continúa y pierde la esperanza de ayuda.", "c) Agresor cambia solo.", "d) Se vuelve resiliente solo."], correct: 1, retro: "Retroalimentación: La falta de apoyo cronifica el abuso (Fuente [23])." },
            { q: "30. Herramientas para detectar emociones en el aula:", options: ["a) Exámenes sorpresa.", "b) Espacios de dibujo y poesía.", "c) Entrevistas públicas.", "d) Revisión de mochilas."], correct: 1, retro: "Retroalimentación: Permiten manifestar sentimientos sin interrogatorios directos (Fuente [23])." },
            { q: "31. Indicador físico evidente de sospecha:", options: ["a) Uniforme limpio.", "b) Marcas, heridas o quemaduras sin explicación coherente.", "c) Cabello corto.", "d) Cicatriz de cirugía."], correct: 1, retro: "Retroalimentación: Lesiones que no concuerdan con la causa alegada son alertas (Fuente [24])." },
            { q: "32. El uso de vestimenta inadecuada para el clima busca:", options: ["a) Seguir moda.", "b) Ocultar lesiones físicas.", "c) Ahorrar dinero.", "d) Llamar atención."], correct: 1, retro: "Retroalimentación: Es una señal conductual para esconder moretones (Fuente [25])." },
            { q: "33. Indicador conductual institucional:", options: ["a) Olimpiadas científicas.", "b) Temor a permanecer en el establecimiento o ir a casa.", "c) Puntualidad.", "d) Relación con autoridades."], correct: 1, retro: "Retroalimentación: El miedo a volver al hogar es una señal crítica (Fuente [26])." },
            { q: "34. La conversación para aclarar sospechas debe fundarse en:", options: ["a) Preguntas cerradas.", "b) Preguntas abiertas en lugar reservado.", "c) Amenazas.", "d) Promesas de premios."], correct: 1, retro: "Retroalimentación: Permite obtener información sin que sea un interrogatorio (Fuente [27])." },
            { q: "35. ¿Qué NO se debe hacer durante la detección?", options: ["a) Escuchar atento.", "b) Juzgar, regañar o minimizar la situación.", "c) Creer lo escuchado.", "d) Ponerse a misma altura."], correct: 1, retro: "Retroalimentación: No se debe pensar que la víctima imaginó la situación (Fuente [5])." },
            { q: "36. Ante un relato espontáneo, el maestro NO debe:", options: ["a) Recolectar datos.", "b) Emitir opiniones de rechazo o desaprobación.", "c) Postura objetiva.", "d) Buscar apoyo adulto."], correct: 1, retro: "Retroalimentación: No se pueden manifestar acusaciones sobre lo revelado (Fuente [28])." },
            { q: "37. ¿Quién debe realizar la conversación ante sospecha de abuso sexual?", options: ["a) Portero.", "b) Maestra en ambiente tranquilo y privado.", "c) Director ante junta.", "d) Madre sospechosa."], correct: 1, retro: "Retroalimentación: Se busca despejar sospechas mediante la empatía (Fuente [29])." },
            { q: "38. Bajo ningún concepto el personal educativo deberá:", options: ["a) Informar al director.", "b) Interrogar al niño o enfrentarlo al agresor.", "c) Contención emocional.", "d) Reportar a DNA."], correct: 1, retro: "Retroalimentación: Enfrentarlos al agresor es una revictimización grave (Fuente [29])." },
            { q: "39. Si hay inconsistencias graves entre relatos:", options: ["a) Creer siempre a padres.", "b) Derivar a centro de salud para revisión física.", "c) Castigar al niño.", "d) No hacer nada."], correct: 1, retro: "Retroalimentación: Salud verificará científicamente la posibilidad de violencia (Fuente [30])." },
            { q: "40. El maestro es un 'puente' para:", options: ["a) Cobrar multas.", "b) Garantizar bienestar y protección integral.", "c) Informar chismes.", "d) Organizar fiestas."], correct: 1, retro: "Retroalimentación: El rol docente es buscar los servicios de protección necesarios (Fuente [31])." },
            { q: "41. ¿Qué es la 'Contención emocional de emergencia'?", options: ["a) Castigo físico leve.", "b) Primeros auxilios psicológicos y escucha activa.", "c) Encerrar al niño.", "d) Llamar para regañar."], correct: 1, retro: "Retroalimentación: Son procedimientos básicos de acogida inmediata (Fuente [32, 33])." },
            { q: "42. Si el maestro siente limitaciones por traumas propios debe:", options: ["a) Obligarse a atender.", "b) Traspasar el caso a quien pueda atenderlo.", "c) Ignorar el caso.", "d) Minimizar importancia."], correct: 1, retro: "Retroalimentación: Debe primar el interés superior del estudiante (Fuente [32, 34])." },
            { q: "43. El 'Riesgo Alto' se identifica por:", options: ["a) Olvido de tareas.", "b) Lesiones reiteradas, omisiones intensas o cuidador con adicciones.", "c) Insulto aislado.", "d) Falta de juguete."], correct: 1, retro: "Retroalimentación: Situaciones que afectan severamente la salud y desarrollo (Fuente [35])." },
            { q: "44. Todos los casos de Violencia Sexual son:", options: ["a) Riesgo Bajo.", "b) Riesgo Medio.", "c) Riesgo Alto.", "d) Asunto privado."], correct: 2, retro: "Retroalimentación: Por su gravedad, deben denunciarse de inmediato (Fuente [36])." },
            { q: "45. Medida de protección que el director debe garantizar:", options: ["a) Expulsión víctima.", "b) No realizar interrogatorios exhaustivos revictimizantes.", "c) Guardar secreto.", "d) Ver al agresor."], correct: 1, retro: "Retroalimentación: No se deben pedir detalles de signos no visibles (Fuente [37])." },
            { q: "46. Plazo máximo para denunciar riesgo alto ante DNA:", options: ["a) Una semana.", "b) 24 horas de conocido el hecho.", "c) Fin de año.", "d) 48 horas."], correct: 1, retro: "Retroalimentación: La comunicación a la DNA es inmediata y urgente (Fuente [38, 39])." },
            { q: "47. En casos de violencia sexual, la guía establece que:", options: ["a) Hay mediación familiar.", "b) Nunca existe la opción de mediación ni arreglos extrajudiciales.", "c) Director decide.", "d) Esperar mayoría edad."], correct: 1, retro: "Retroalimentación: Los delitos sexuales son de orden público e irrenunciables (Fuente [38])." },
            { q: "48. Servicio gratuito de apoyo psico-emocional mencionado:", options: ["a) Radio Fides.", "b) Familia Segura 800113040.", "c) Sindicato.", "d) Tránsito."], correct: 1, retro: "Retroalimentación: Brinda apoyo confidencial los 7 días de la semana (Fuente [40, 41])." },
            { q: "49. Si un maestro recibe amenazas por denunciar puede:", options: ["a) Retirar denuncia.", "b) Demandar por intimidación y solicitar protección.", "c) Renunciar.", "d) Pedir perdón."], correct: 1, retro: "Retroalimentación: El sistema debe proteger al denunciante y su familia (Fuente [42])." },
            { q: "50. En emergencia médica por violencia, la autoridad debe:", options: ["a) Esperar padres.", "b) Acompañar al estudiante al centro de salud más cercano.", "c) Enviar en taxi.", "d) Llamar prensa."], correct: 1, retro: "Retroalimentación: La prioridad es la salud, notificando luego a la familia (Fuente [43])." }
        ];

        const container = document.getElementById('quiz-container');
        const resumenFinal = document.getElementById('resultado-final');
        let aciertos = 0;
        const respuestas = {};

        function actualizarResumen() {
            const totalPreguntas = (typeof questions !== 'undefined' ? questions : quizData).length;
            const porcentaje = totalPreguntas ? (aciertos / totalPreguntas) * 100 : 0;
            resumenFinal.style.display = 'block';
            resumenFinal.innerHTML = `Porcentaje de acertividad: ${porcentaje.toFixed(2)}%<br>Aciertos: ${aciertos} / ${totalPreguntas}`;
        }

        function registrarRespuesta(qIdx, esCorrecta) {
            if (respuestas[qIdx] !== undefined) return;
            respuestas[qIdx] = esCorrecta;
            if (esCorrecta) {
                aciertos++;
            }
            actualizarResumen();
        }

        quizData.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `<div class="question-text">${item.q}</div>`;
            
            const list = document.createElement('ul');
            list.className = 'options';
            
            item.options.forEach((opt, optIndex) => {
                const li = document.createElement('li');
                li.innerText = opt;
                li.onclick = () => {
                    const feedback = document.getElementById(`feedback-${index}`);
                    feedback.style.display = 'block';
                    if (optIndex === item.correct) {
                        registrarRespuesta(index, true);
                        feedback.innerText = item.retro;
                        feedback.className = 'feedback correct';
                    } else {
                        registrarRespuesta(index, false);
                        feedback.innerText = "vuelve a analizar la pregunta";
                        feedback.className = 'feedback incorrect';
                    }
                };
                list.appendChild(li);
            });
            
            card.appendChild(list);
            const feedbackDiv = document.createElement('div');
            feedbackDiv.id = `feedback-${index}`;
            feedbackDiv.className = 'feedback';
            card.appendChild(feedbackDiv);
            container.appendChild(card);
        });
    </script>
    <script src="quiz-behavior.js"></script>
</body>
</html>
