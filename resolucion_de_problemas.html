<!DOCTYPE html>
<html lang="es">
<head>

    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      gtag('config', 'G-ZE9G1KRVW8');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Examen - Manual de Resolución de Problemas</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; max-width: 900px; margin: 0 auto; padding: 20px; background-color: #f0f3f4; color: #212f3d; }
        h1 { text-align: center; color: #1f618d; border-bottom: 4px solid #1f618d; padding-bottom: 10px; text-transform: uppercase; }
        .question-card { background: #ffffff; padding: 25px; margin-bottom: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-left: 8px solid #1f618d; }
        .question-text { font-size: 1.15em; font-weight: bold; margin-bottom: 15px; color: #1a5276; }
        .options { list-style: none; padding: 0; }
        .options li { margin: 10px 0; padding: 12px 18px; border: 1px solid #d5dbdb; border-radius: 8px; cursor: pointer; transition: all 0.3s ease; background: #fdfefe; }
        .options li:hover { background-color: #ebf5fb; border-color: #1f618d; }
        .feedback { margin-top: 15px; padding: 15px; border-radius: 8px; display: none; font-weight: 500; animation: fadeIn 0.4s; }
        .correct { background-color: #d4efdf; color: #145a32; border: 1px solid #27ae60; }
        .incorrect { background-color: #f9ebea; color: #922b21; border: 1px solid #c0392b; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <h1>Simulador: Manual de Resolución de Problemas (UNICEF/SEP)</h1>
    <div id="quiz-container"></div>
    <div id="resultado-final" style="display:none; margin-top:20px; padding:16px; border-radius:14px; background:#fff; border:1px solid #d9dfe3; font-weight:700;"></div>

    <script>
        const quizData = [
            { q: "1. ¿Cómo se define la 'resolución de problemas' según el manual?", options: ["a) Ignorar dificultades temporales.", "b) Capacidad de identificar una dificultad, tomar medidas lógicas, supervisar y evaluar.", "c) Proceso puramente intuitivo.", "d) Delegación de conflictos a autoridades."], correct: 1, retro: "Retroalimentación: Implica un proceso activo que alterna entre el análisis y la acción para encontrar una solución deseada (Fuente [4])." },
            { q: "2. Las 12 habilidades del Marco Global de UNICEF se organizan en:", options: ["a) Áreas Cognitiva, Psicomotora y Afectiva.", "b) Dimensiones Teórica y Práctica.", "c) Dimensiones Cognitiva, Instrumental, Individual y Social.", "d) Cinco ejes transversales."], correct: 2, retro: "Retroalimentación: El manual clasifica las habilidades transferibles en estas cuatro dimensiones fundamentales (Fuente [5, 6])." },
            { q: "3. ¿Qué habilidades se incluyen dentro de la 'Dimensión Cognitiva'?", options: ["a) Cooperación y negociación.", "b) Respeto y empatía.", "c) Creatividad, pensamiento crítico y resolución de problemas.", "d) Manejo de emociones."], correct: 2, retro: "Retroalimentación: Estas habilidades permiten procesar información y generar soluciones innovadoras (Fuente [5])." },
            { q: "4. ¿Qué habilidades pertenecen a la 'Dimensión Instrumental'?", options: ["a) Creatividad.", "b) Cooperación, negociación y toma de decisiones.", "c) Empatía.", "d) Resiliencia."], correct: 1, retro: "Retroalimentación: Se enfoca en las habilidades necesarias para la interacción y ejecución de tareas grupales (Fuente [5])." },
            { q: "5. El manual indica que la resolución de problemas alterna entre:", options: ["a) Teoría y repetición.", "b) Análisis y acción.", "c) Observación y silencio.", "d) Sanción y perdón."], correct: 1, retro: "Retroalimentación: Este proceso reflexivo brinda claridad sobre la dificultad y las posibles rutas a transitar (Fuente [2])." },
            { q: "6. El objetivo principal de fortalecer esta habilidad es:", options: ["a) Evitar conflictos.", "b) Desarrollar creatividad y toma de decisiones para soluciones óptimas.", "c) Cumplir carga horaria.", "d) Clasificar estudiantes."], correct: 1, retro: "Retroalimentación: Contribuye a generar alternativas que van más allá de lo evidente (Fuente [3])." },
            { q: "7. ¿Cómo ayuda el pensamiento crítico ante la información actual?", options: ["a) Memorización masiva.", "b) Sopesar contenido sustentado frente a información falsa o propaganda.", "c) Difusión sin verificar.", "d) Seguir canales oficiales únicamente."], correct: 1, retro: "Retroalimentación: Permite un tratamiento eficaz de la gran cantidad de información disponible en redes (Fuente [3])." },
            { q: "8. El criterio pedagógico 'SAFE' significa:", options: ["a) Seguro, Analítico, Fuerte, Eficaz.", "b) Secuencial, Activo, Focalizado y Explícito.", "c) Sistémico, Autónomo, Flexible, Evolutivo.", "d) Sencillo, Atractivo, Funcional, Estable."], correct: 1, retro: "Retroalimentación: Los programas que siguen esta secuencia lógica son más efectivos (Fuente [7, 8])." },
            { q: "9. ¿Qué paso sigue inmediatamente tras identificar un problema?", options: ["a) Implementar la primera idea.", "b) Analizarlo para comprender causas y descomponerlo.", "c) Evaluar resultados finales.", "d) Premiar a los alumnos."], correct: 1, retro: "Retroalimentación: El análisis es la primera fase para precisar la dificultad antes de actuar (Fuente [9, 10])." },
            { q: "10. Parte importante del proceso inicial es:", options: ["a) Ignorar experiencias previas.", "b) Recurrir a lo que sabemos y delimitarlo con precisión.", "c) Esperar a que sea inmanejable.", "d) Decisión sin consultar."], correct: 1, retro: "Retroalimentación: Delimitarlo evita que la situación se vuelva incontrolable (Fuente [11])." },
            { q: "11. ¿Qué se busca en la fase de 'Generar soluciones'?", options: ["a) Elegir la opción barata.", "b) Pensar posibilidades de forma fluida, creativa y sin juicios iniciales.", "c) Criticar ideas ajenas.", "d) Solución que solo beneficie al docente."], correct: 1, retro: "Retroalimentación: Es vital permitir que la creatividad fluya antes de evaluar la viabilidad (Fuente [10, 12])." },
            { q: "12. La estrategia de 'los cinco porqués' sirve para:", options: ["a) Justificar errores.", "b) Profundizar sobre la causa raíz del problema.", "c) Cuestionar autoridad.", "d) Repetir instrucciones."], correct: 1, retro: "Retroalimentación: Ayuda a ir más allá de los síntomas superficiales (Fuente [13])." },
            { q: "13. Al analizar, ¿a qué fuentes se debe recurrir?", options: ["a) Rumores.", "b) Libros, especialistas o páginas web institucionales confiables.", "c) Redes sociales sin verificar.", "d) Criterio del director únicamente."], correct: 1, retro: "Retroalimentación: Recurrir a información verificada mejora la comprensión del problema (Fuente [13])." },
            { q: "14. ¿Qué implica evaluar 'pros y contras'?", options: ["a) Contar votos.", "b) Anticipar consecuencias y evaluar si serán beneficiosas o perjudiciales.", "c) Elegir lo más rápido.", "d) Anotar nombres."], correct: 1, retro: "Retroalimentación: Evita soluciones impulsivas con efectos negativos a largo plazo (Fuente [14, 15])." },
            { q: "15. 'Valorar la importancia' de las consecuencias significa:", options: ["a) Precio económico.", "b) Relevancia según valores, necesidades y opiniones pertinentes.", "c) Ignorar desventajas.", "d) Decisión por software."], correct: 1, retro: "Retroalimentación: La importancia es subjetiva y depende del contexto de los involucrados (Fuente [16])." },
            { q: "16. 'Contrastar' se enfoca en:", options: ["a) Identificar diferencias entre elementos.", "b) Encontrar fallas lógicas.", "c) Ignorar puntos comunes.", "d) Copiar soluciones."], correct: 0, retro: "Retroalimentación: Permite evaluar alternativas de manera lógica y estructurada (Fuente [17])." },
            { q: "17. En resolución de problemas, 'planificar' es:", options: ["a) Informe posterior.", "b) Definir pasos, asignar responsables, recursos y cronograma.", "c) Sin supervisión.", "d) Cambiar opinión diario."], correct: 1, retro: "Retroalimentación: Ayuda a anticipar obstáculos y asegura eficiencia (Fuente [18, 19])." },
            { q: "18. ¿Por qué monitorear durante la implementación?", options: ["a) Castigar responsables.", "b) Ajustar planificación y asegurar el éxito.", "c) Formularios obligatorios.", "d) Demostrar razón."], correct: 1, retro: "Retroalimentación: El seguimiento permite corregir el rumbo oportunamente (Fuente [19, 20])." },
            { q: "19. La verdadera participación estudiantil debe ser:", options: ["a) Bajo amenaza.", "b) Voluntaria y sin coerción.", "c) Solo ejecución.", "d) Dirigida sin opciones."], correct: 1, retro: "Retroalimentación: Nadie puede obligar o manipular a un estudiante para que participe realmente (Fuente [21])." },
            { q: "20. ¿Qué rol docente promueve la participación?", options: ["a) Intervención máxima.", "b) Actitud modesta que reconozca la capacidad del estudiante.", "c) Único que responde.", "d) Ignorar intereses."], correct: 1, retro: "Retroalimentación: El docente debe modelar la habilidad y fomentar la autonomía (Fuente [22])." },
            { q: "21. Al preguntar por qué sucesivamente se debe:", options: ["a) Ser siempre 5 veces.", "b) Recurrir a la respuesta anterior para profundizar.", "c) Preguntar a 5 personas.", "d) Hacerlo al final."], correct: 1, retro: "Retroalimentación: Es la técnica para llegar a la causa raíz de la situación (Fuente [13])." },
            { q: "22. No se deben juzgar las ideas al generar soluciones porque:", options: ["a) Son perfectas.", "b) El juicio frena la creatividad.", "c) Solo juzga el director.", "d) No hay tiempo."], correct: 1, retro: "Retroalimentación: La evaluación de viabilidad corresponde a un paso posterior (Fuente [12])." },
            { q: "23. Beneficio socioemocional de la habilidad:", options: ["a) Egocentrismo.", "b) Reducción de estrés y ansiedad.", "c) Dependencia.", "d) Ganar discusiones."], correct: 1, retro: "Retroalimentación: Tener estrategias claras brinda seguridad emocional (Fuente [23])." },
            { q: "24. Un organizador gráfico en la lección 8 sirve para:", options: ["a) Decoración.", "b) Comparar y contrastar alternativas visualmente.", "c) Mapa de escuela.", "d) Asistencia."], correct: 1, retro: "Retroalimentación: Ayuda a tomar decisiones informadas estructurando las opciones (Fuente [17, 24])." },
            { q: "25. El paso final del proceso es:", options: ["a) Causa raíz.", "b) Elegir una solución e implementarla.", "c) Lluvia de ideas.", "d) Diagnóstico."], correct: 1, retro: "Retroalimentación: Cierra el ciclo tras el análisis y la evaluación (Fuente [25, 26])." },
            { q: "26. Diferencia entre pro y contra:", options: ["a) Edad de la idea.", "b) Pro es beneficio y contra es desventaja.", "c) Quién lo dice.", "d) Son sinónimos."], correct: 1, retro: "Retroalimentación: Clasificar consecuencias ayuda a decidir con solidez (Fuente [14, 15])." },
            { q: "27. ¿Por qué un problema es subjetivo?", options: ["a) Inteligencia.", "b) La percepción depende del contexto individual.", "c) Solo casos graves.", "d) Reglas desiguales."], correct: 1, retro: "Retroalimentación: Una situación puede ser un problema para uno pero no para otro (Fuente [27])." },
            { q: "28. Habilidad de la Dimensión Individual que se fortalece:", options: ["a) Negociación.", "b) Resiliencia.", "c) Creatividad.", "d) Empatía."], correct: 1, retro: "Retroalimentación: Permite enfrentar desafíos futuros con equilibrio (Fuente [5, 28])." },
            { q: "29. En planificación, los recursos son:", options: ["a) Solo dinero.", "b) Ingredientes, materiales, presupuesto y herramientas.", "c) Lista de ausentes.", "d) Recreo."], correct: 1, retro: "Retroalimentación: Preverlos asegura que las tareas sean alcanzables (Fuente [19, 29])." },
            { q: "30. Los estudiantes deben participar desde:", options: ["a) Calificación final.", "b) Primeras etapas, incluyendo el diseño.", "c) Cuando el maestro para.", "d) Fin de ciclo."], correct: 1, retro: "Retroalimentación: Involucrarlos desde el inicio fortalece su compromiso (Fuente [30])." },
            { q: "31. La herramienta BMI se refiere a:", options: ["a) Examen tradicional.", "b) Bueno, Malo e Interesante.", "c) Dibujo libre.", "d) Asamblea."], correct: 1, retro: "Retroalimentación: Técnica que desarrolla el pensamiento crítico sobre experiencias (Fuente [17])." },
            { q: "32. Descomponer un problema significa:", options: ["a) Ignorar lo difícil.", "b) Dividirlo en tareas pequeñas y concretas.", "c) Repartirlo a otras escuelas.", "d) Romper materiales."], correct: 1, retro: "Retroalimentación: Facilita el análisis y la implementación de soluciones (Fuente [13, 31])." },
            { q: "33. Propósito del Diagnóstico de habilidades:", options: ["a) Notas de reprobado.", "b) Medir nivel inicial y rastrear progreso.", "c) Concurso de mejores.", "d) Requisito sin valor."], correct: 1, retro: "Retroalimentación: Es clave para planificar la enseñanza según necesidades (Fuente [32, 33])." },
            { q: "34. Actitud docente a evitar:", options: ["a) Preguntas abiertas.", "b) Coerción o manipulación.", "c) Escucha activa.", "d) Adaptar lecciones."], correct: 1, retro: "Retroalimentación: La participación auténtica requiere libertad de elección (Fuente [21])." },
            { q: "35. El valor de una consecuencia es subjetivo porque:", options: ["a) No hay números.", "b) Depende de valores, necesidades y contexto personal.", "c) Es opinión sin valor.", "d) Cambia diario."], correct: 1, retro: "Retroalimentación: Lo relevante para un equipo puede no serlo para otro (Fuente [16])." },
            { q: "36. Componente de la autocompasión mencionado:", options: ["a) Castigo personal.", "b) Humanidad compartida, atención plena y bondad.", "c) Comparación.", "d) Negación."], correct: 1, retro: "Retroalimentación: Mejora la resiliencia ante desafíos difíciles (Fuente [28])." },
            { q: "37. ¿Qué es la Causa Raíz?", options: ["a) Primer síntoma.", "b) Origen profundo que evita recurrencia al resolverse.", "c) Culpable inicial.", "d) Costo más alto."], correct: 1, retro: "Retroalimentación: Permite una solución definitiva y no temporal (Fuente [13])." },
            { q: "38. ¿Por qué asignar responsables?", options: ["a) Para culpar.", "b) Asegurar que cada tarea tenga encargado de ejecución.", "c) Menos trabajo docente.", "d) Competencia."], correct: 1, retro: "Retroalimentación: La asignación de roles es vital para coordinar equipos (Fuente [19, 20])." },
            { q: "39. Relación con el futuro profesional:", options: ["a) Ninguna.", "b) Prepara para manejar situaciones difíciles en vida adulta y trabajo.", "c) Puesto automático.", "d) Evitar equipo."], correct: 1, retro: "Retroalimentación: Es una habilidad para la vida que trasciende la escuela (Fuente [23, 34])." },
            { q: "40. Si una lección toma más tiempo del previsto:", options: ["a) Cortar discusión.", "b) Evitar concluir apresuradamente y alentar debates profundos.", "c) Dar razón rápido.", "d) Castigar."], correct: 1, retro: "Retroalimentación: El aprendizaje profundo requiere tiempo de reflexión (Fuente [35])." },
            { q: "41. Primer paso sugerido para implementar el manual:", options: ["a) Revisión final.", "b) Aplicar el Diagnóstico de habilidades.", "c) Comprar materiales.", "d) Pedir permiso."], correct: 1, retro: "Retroalimentación: Establece el punto de partida del desarrollo de habilidades (Fuente [33, 36])." },
            { q: "42. Según el manual, los problemas son:", options: ["a) Situaciones anormales.", "b) Comunes y normales en cualquier ámbito.", "c) Solo de indisciplina.", "d) Señal de falta inteligencia."], correct: 1, retro: "Retroalimentación: La conciencia de normalidad reduce el estrés (Fuente [37-39])." },
            { q: "43. 'Modelar' la habilidad significa:", options: ["a) Dibujar niños.", "b) El docente practica e interioriza la habilidad para dar ejemplo.", "c) Contratar modelos.", "d) Seguir al pie de la letra."], correct: 1, retro: "Retroalimentación: 'Enseñamos lo que somos'; el docente debe vivir la participación (Fuente [40])." },
            { q: "44. En el caso de 'Rita y el celular' ayudó saber:", options: ["a) Precio del teléfono.", "b) Modelo de negocio de redes basado en publicidad y segmentación.", "c) Lista amigos.", "d) Horario escuela."], correct: 1, retro: "Retroalimentación: Comprender factores externos (algoritmos) ayuda al análisis profundo (Fuente [41, 42])." },
            { q: "45. La 'Dimensión Social' incluye:", options: ["a) Creatividad.", "b) Respeto por la diversidad, empatía y participación.", "c) Resiliencia.", "d) Negociación."], correct: 1, retro: "Retroalimentación: Se enfoca en ciudadanía activa y convivencia (Fuente [6])." },
            { q: "46. Generar ideas nuevas y originales es:", options: ["a) Evaluación.", "b) Creatividad.", "c) Clasificación.", "d) Memorización."], correct: 1, retro: "Retroalimentación: Fundamental para encontrar soluciones únicas y efectivas (Fuente [3, 5, 43])." },
            { q: "47. Si el equipo elige un tema sensible inadecuado:", options: ["a) Ignorarlos.", "b) Sugerir amablemente elegir opción adecuada al marco escolar.", "c) Expulsarlos.", "d) Sancionarlos."], correct: 1, retro: "Retroalimentación: El docente debe guiar hacia ámbitos constructivos (Fuente [44])." },
            { q: "48. La frase 'enseñamos lo que somos' es de:", options: ["a) Michael Ende.", "b) Palmer Parker.", "c) Pablo Neruda.", "d) Foster Kane."], correct: 1, retro: "Retroalimentación: Resalta la importancia del trabajo personal del docente (Fuente [40])." },
            { q: "49. NO es un paso del proceso de resolución:", options: ["a) Generar soluciones.", "b) Evaluar soluciones.", "c) Ignorar consecuencias negativas.", "d) Analizar problema."], correct: 2, retro: "Retroalimentación: Ignorar consecuencias es una acción impulsiva contraria al método (Fuente [25, 45])." },
            { q: "50. La 'maestría' se logra mediante:", options: ["a) Lectura única.", "b) Practicando una y otra vez en situaciones reales.", "c) Notas altas.", "d) Evitar problemas."], correct: 1, retro: "Retroalimentación: El dominio de la habilidad es fruto de la práctica constante (Fuente [26, 46])." }
        ];

        const container = document.getElementById('quiz-container');
        const resumenFinal = document.getElementById('resultado-final');
        let aciertos = 0;
        const respuestas = {};

        function actualizarResumen() {
            const totalPreguntas = quizData.length;
            const porcentaje = totalPreguntas ? (aciertos / totalPreguntas) * 100 : 0;
            resumenFinal.style.display = 'block';
            resumenFinal.innerHTML = `Porcentaje de acertividad: ${porcentaje.toFixed(2)}%<br>Aciertos: ${aciertos} / ${totalPreguntas}`;
        }

        function registrarRespuesta(qIdx, esCorrecta) {
            if (respuestas[qIdx] !== undefined) return;
            respuestas[qIdx] = esCorrecta;
            if (esCorrecta) {
                aciertos++;
            }
            actualizarResumen();
        }

        quizData.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `<div class="question-text">${item.q}</div>`;
            
            const list = document.createElement('ul');
            list.className = 'options';
            
            item.options.forEach((opt, optIndex) => {
                const li = document.createElement('li');
                li.innerText = opt;
                li.onclick = () => {
                    const feedbackDiv = document.getElementById(`feedback-${index}`);
                    feedbackDiv.style.display = 'block';
                    if (optIndex === item.correct) {
                        registrarRespuesta(index, true);
                        feedbackDiv.innerText = item.retro;
                        feedbackDiv.className = 'feedback correct';
                    } else {
                        registrarRespuesta(index, false);
                        feedbackDiv.innerText = "vuelve a analizar la pregunta";
                        feedbackDiv.className = 'feedback incorrect';
                    }
                };
                list.appendChild(li);
            });
            
            card.appendChild(list);
            const feedbackDiv = document.createElement('div');
            feedbackDiv.id = `feedback-${index}`;
            feedbackDiv.className = 'feedback';
            card.appendChild(feedbackDiv);
            container.appendChild(card);
        });
    </script>
    <script src="quiz-behavior.js"></script>
</body>
</html>
