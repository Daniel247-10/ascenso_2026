<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Examen - Escalafón Nacional Bolivia</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Simulador: Reglamento del Escalafón Nacional</h1>
        <p class="subtitle">Responde cada pregunta y revisa la retroalimentación.</p>
        <div id="quiz"></div>
        <div id="resultado-final" style="display:none; margin-top:20px; padding:16px; border-radius:14px; background:#fff; border:1px solid #d9dfe3; font-weight:700;"></div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="btn">Volver al menú</a>
    </nav>

    <script>
        const questions = [
            { q: "1. ¿Qué es el Escalafón Nacional del Servicio de Educación?", options: ["a) Una lista de méritos sindicales.", "b) El registro sistemático, permanente y centralizado de los datos personales y profesionales de maestros y funcionarios.", "c) Un manual de funciones para directores.", "d) El registro de sanciones disciplinarias."], correct: 1, retro: "Retroalimentación: El Escalafón es el registro oficial y centralizado de toda la trayectoria del personal [2]." },
            { q: "2. ¿Cuál es una de las finalidades principales del Escalafón?", options: ["a) Organizar movilizaciones docentes.", "b) Regular el ingreso y garantizar la continuidad de los maestros y funcionarios.", "c) Fijar los horarios de clase.", "d) Determinar el currículum base."], correct: 1, retro: "Retroalimentación: El reglamento busca regular el ingreso y asegurar la estabilidad laboral [2]." },
            { q: "3. ¿Qué instancia es la Agencia Central encargada de atender el Escalafón Nacional?", options: ["a) La Confederación de Maestros.", "b) El Departamento de Estadística y Personal del Ministerio de Educación.", "c) Las Direcciones Distritales.", "d) La Contraloría General."], correct: 1, retro: "Retroalimentación: Esta oficina centraliza el kardex y las inscripciones a nivel nacional [3]." },
            { q: "4. ¿Cuáles son los dos sectores que comprende el Servicio de Educación?", options: ["a) Formal e informal.", "b) Sector docente y sector administrativo.", "c) Urbano y rural.", "d) Fiscal y de convenio."], correct: 1, retro: "Retroalimentación: El servicio se divide entre quienes atienden el sistema (docentes) y funciones no docentes (administrativos) [6]." },
            { q: "5. ¿Cuál es el rango de edad permitido para ingresar al sector docente del magisterio fiscal?", options: ["a) De 18 a 60 años.", "b) De 21 a 55 años.", "c) De 18 a 50 años.", "d) De 25 a 45 años."], correct: 2, retro: "Retroalimentación: El reglamento fija un límite de ingreso entre los 18 y 50 años [7]." },
            { q: "6. ¿Cuáles son las tres clases de maestros que reconoce el Estado boliviano?", options: ["a) De aula, técnicos y especialidad.", "b) Normalistas, titulares e interinos.", "c) Egresados, titulados y jubilados.", "d) Provinciales, urbanos y fronterizos."], correct: 1, retro: "Retroalimentación: Se clasifica a los maestros según su formación y estatus legal [7]." },
            { q: "7. ¿Qué requisito de instrucción mínima se exige a un interino para enseñar en el ciclo primario?", options: ["a) Certificado pedagógico.", "b) Diploma de Bachiller y examen de capacidad.", "c) Título de técnico medio.", "d) Dos años de Normal."], correct: 1, retro: "Retroalimentación: En emergencias, se permite a bachilleres ejercer tras un examen [7]." },
            { q: "8. ¿A partir de cuántos años de servicio un maestro interino puede ser declarado titular?", options: ["a) A los 5 años.", "b) A los 10 años, tras aprobar un examen de capacidad.", "c) A los 15 años.", "d) A los 20 años."], correct: 1, retro: "Retroalimentación: La titularidad definitiva requiere 10 años de experiencia y aprobación de prueba [8]." },
            { q: "9. ¿Cuál es un impedimento legal para ser admitido en el ejercicio de la docencia?", options: ["a) Falta de postgrados.", "b) Vida notoriamente inmoral o sentencia penal ejecutoriada.", "c) Tener menos de 25 años.", "d) Ser extranjero con residencia de un año."], correct: 1, retro: "Retroalimentación: La conducta moral y la ausencia de antecedentes penales son requisitos clave [9]." },
            { q: "10. ¿Cuándo deben los maestros normalistas solicitar su inscripción en el Escalafón?", options: ["a) Al cumplir 5 años de servicio.", "b) Desde que se inician en el ejercicio docente.", "c) Al ascender a la cuarta categoría.", "d) Al recibir sueldo de frontera."], correct: 1, retro: "Retroalimentación: Es una obligación desde el comienzo de su carrera profesional [10]." },
            { q: "11. ¿Qué requisitos deben cumplir los interinos para optar a la inscripción en el Escalafón?", options: ["a) Presentar diploma de bachiller.", "b) Cumplir 5 años de servicio y aprobar el examen de idoneidad.", "c) Dos cartas de recomendación.", "d) 2 años en el área rural."], correct: 1, retro: "Retroalimentación: Requieren acreditar 5 años de experiencia y capacidad técnica [11]." },
            { q: "12. ¿Bajo qué condición los funcionarios administrativos pueden inscribirse en el Escalafón?", options: ["a) Al mes de ser designados.", "b) Después de 5 años de servicio y examen de idoneidad.", "c) Con título universitario.", "d) Al pasar a área urbana."], correct: 1, retro: "Retroalimentación: Se aplica el mismo criterio de 5 años que a los interinos [12]." },
            { q: "13. ¿En qué dos proyecciones complementarias se desarrolla la carrera docente y administrativa?", options: ["a) Evaluación sindical y comunitaria.", "b) Ascensos de jerarquía y promociones de categoría.", "c) Aumento salarial y bonos de zona.", "d) Méritos académicos y servicio militar."], correct: 1, retro: "Retroalimentación: La jerarquía responde a dotes/méritos y la categoría a la antigüedad [13]." },
            { q: "14. ¿De qué factor depende fundamentalmente la promoción de categoría?", options: ["a) Calificación del director.", "b) Antigüedad en el servicio.", "c) Número de alumnos aprobados.", "d) Estudios de postgrado."], correct: 1, retro: "Retroalimentación: La categoría premia directamente el tiempo de permanencia activa [13]." },
            { q: "15. ¿Cuál es el cargo de mayor rango en la escala jerárquica docente?", options: ["a) Director de Unidad Educativa.", "b) Director General de Educación.", "c) Ministro de Educación.", "d) Jefe de Distrito."], correct: 1, retro: "Retroalimentación: El Director General encabeza la escala jerárquica técnica [14]." },
            { q: "16. ¿Cuál es el cargo de mayor rango en la escala jerárquica administrativa?", options: ["a) Jefe de Sección.", "b) Oficial Mayor del Ministerio de Educación.", "c) Secretario General.", "d) Director Nacional de Biblioteca."], correct: 1, retro: "Retroalimentación: Es el nivel más alto de la estructura administrativa del ramo [15]." },
            { q: "17. ¿Cómo se determinan legalmente los ascensos a las direcciones de establecimientos?", options: ["a) Invitación de la Junta Escolar.", "b) Concurso de méritos y examen de competencia.", "c) Maestro más antiguo.", "d) Designación sindical."], correct: 1, retro: "Retroalimentación: La ley exige un proceso competitivo de méritos y capacidades [16, 17]." },
            { q: "18. ¿Cuántos puntos como máximo se pueden asignar por 'Estudios y títulos profesionales'?", options: ["a) 50 puntos.", "b) 100 puntos.", "c) 200 puntos.", "d) 15 puntos."], correct: 1, retro: "Retroalimentación: Es el tope máximo para la valoración de la formación académica [16]." },
            { q: "19. ¿Cuántos puntos otorga poseer el título de 'Doctor en Pedagogía'?", options: ["a) 10 puntos.", "b) 15 puntos.", "c) 20 puntos.", "d) 5 puntos."], correct: 2, retro: "Retroalimentación: Es el título con la mayor asignación de puntaje individual [18]." },
            { q: "20. ¿Qué puntaje se asigna por la sola 'Inscripción en el escalafón'?", options: ["a) 1 punto.", "b) 5 puntos.", "c) 10 puntos.", "d) 0 puntos."], correct: 1, retro: "Retroalimentación: El registro inicial ya cuenta como un mérito profesional [19]." },
            { q: "21. ¿Cómo se califica cuantitativamente el tiempo de servicios?", options: ["a) 1 punto por cada año.", "b) 1 punto por cada trimestre de trabajo.", "c) 5 puntos por cada quinquenio.", "d) 1 punto por cada mes."], correct: 1, retro: "Retroalimentación: El cálculo de antigüedad es trimestral en la calificación [18]." },
            { q: "22. ¿Qué beneficio de antigüedad reciben los normalistas tras 2 años en fronteras (no oriundos)?", options: ["a) 3 años de antigüedad.", "b) 4 años de antigüedad para jubilación y categoría.", "c) Ascenso automático.", "d) Sueldo triple."], correct: 1, retro: "Retroalimentación: El servicio en frontera duplica el tiempo para beneficios de antigüedad [20]." },
            { q: "23. ¿Qué beneficio de antigüedad tienen los titulares o interinos tras 4 años en zona de frontera?", options: ["a) 5 años.", "b) 6 años de antigüedad.", "c) 20 puntos extra.", "d) Media jornada."], correct: 1, retro: "Retroalimentación: Para interinos, el beneficio de frontera requiere 4 años para sumar 6 [20]." },
            { q: "24. ¿En cuántas áreas se juzgan los deméritos del personal docente?", options: ["a) 3 áreas.", "b) 5 áreas.", "c) 10 áreas.", "d) 2 áreas."], correct: 1, retro: "Retroalimentación: Incluyen faltas de asistencia, comportamiento, rendimiento, abusos y fallos [21]." },
            { q: "25. ¿Cuál es el rango de puntos que se pierde por el uso de castigos corporales contra alumnos?", options: ["a) De 1 a 5 puntos.", "b) De 1 a 20 puntos.", "c) Retiro definitivo.", "d) De 5 a 10 puntos."], correct: 1, retro: "Retroalimentación: Se considera una falta grave en el área de abusos contra alumnos [22]." },
            { q: "26. ¿A cuánto asciende el porcentaje de bonificación por la 1ra Categoría?", options: ["a) Al 75% del básico.", "b) Al 100% del básico.", "c) Al 80% del básico.", "d) Al 50% del básico."], correct: 1, retro: "Retroalimentación: La máxima categoría duplica el haber básico del cargo [23]." },
            { q: "27. ¿Desde cuándo perciben los maestros normalistas la bonificación de 5ta categoría?", options: ["a) Al cumplir 5 años.", "b) Desde su iniciación en la carrera.", "c) Al aprobar examen.", "d) Al obtener título."], correct: 1, retro: "Retroalimentación: Es un derecho adquirido desde el inicio para normalistas [23, 24]." },
            { q: "28. ¿A los cuántos años un interino o administrativo asciende a la 4ta categoría?", options: ["a) A los 5 años.", "b) A los 10 años cumplidos.", "c) A los 15 años.", "d) A los 8 años."], correct: 1, retro: "Retroalimentación: El ascenso periódico para este sector es cada 5 años [25]." },
            { q: "29. ¿Qué beneficio otorga el examen voluntario de promoción de categoría?", options: ["a) Bono único.", "b) Abreviar el proceso de promociones.", "c) Exención rural.", "d) Cargo jerárquico."], correct: 1, retro: "Retroalimentación: Permite subir de categoría antes del tiempo reglamentario por antigüedad [25]." },
            { q: "30. ¿Con cuántos años de servicio y examen aprobado puede un normalista ascender a la 2da categoría?", options: ["a) 15 años.", "b) 12 años.", "c) 10 años.", "d) 20 años."], correct: 1, retro: "Retroalimentación: El examen permite llegar a 2da categoría a los 12 años en lugar de 15 [26]." },
            { q: "31. ¿Qué sucede si un postulante reprueba el examen voluntario de categoría?", options: ["a) Pierde 10 puntos.", "b) Puede ser promovido después por antigüedad normal.", "c) Espera 5 años.", "d) Pierde inamovilidad."], correct: 1, retro: "Retroalimentación: El examen es opcional; si falla, sigue el curso normal del tiempo [27]." },
            { q: "32. ¿Qué consecuencia tiene para un interino no rendir la prueba de idoneidad tras 6 años?", options: ["a) Llamada de atención.", "b) Inhabilitación para el ejercicio docente.", "c) Suspensión de sueldo.", "d) Degradación a 5ta."], correct: 1, retro: "Retroalimentación: La profesionalización es obligatoria para la permanencia [27]." },
            { q: "33. ¿Qué función cumple la Comisión Nacional del Escalafón?", options: ["a) Pagar sueldos.", "b) Tribunal de Apelación revisor y supervisor.", "c) Redactar textos.", "d) Supervisar juntas."], correct: 1, retro: "Retroalimentación: Es la instancia máxima para resolver controversias sobre calificaciones [28]." },
            { q: "34. ¿Qué plazo tiene un maestro para apelar una calificación de méritos?", options: ["a) 48 horas.", "b) 5 días.", "c) 10 días desde la notificación.", "d) 30 días."], correct: 2, retro: "Retroalimentación: El reglamento garantiza 10 días para ejercer el derecho de queja [29]." },
            { q: "35. ¿Cuántos años de servicio mínimo se requieren para ser Director de Escuela?", options: ["a) 2 años.", "b) 5 años.", "c) 10 años.", "d) 15 años."], correct: 1, retro: "Retroalimentación: Además de los 5 años, se exige un mínimo de 100 puntos en méritos [30]." },
            { q: "36. ¿Cuáles son los requisitos mínimos para ser Director General de Educación?", options: ["a) 10 años y 1ra categoría.", "b) 15 años y 200 puntos de méritos.", "c) Título de doctor.", "d) 20 años."], correct: 1, retro: "Retroalimentación: Es el cargo con las exigencias más altas de trayectoria [31]." },
            { q: "37. ¿Cómo se resuelve una situación de paridad de méritos en un concurso?", options: ["a) Sorteo.", "b) Decisión del Director.", "c) Examen de competencia.", "d) El de mayor edad."], correct: 2, retro: "Retroalimentación: El examen técnico es el mecanismo de desempate legal [17]." },
            { q: "38. ¿En qué consiste la 'acumulación de cargos docentes'?", options: ["a) Dos colegios particulares.", "b) Un cargo principal y otro cargo docente u horas excedentes.", "c) Director y portero.", "d) Dos categorías distintas."], correct: 1, retro: "Retroalimentación: Permite ampliar la carga horaria dentro del sistema fiscal [32]." },
            { q: "39. ¿Cuántas horas semanales puede acumular un profesor en Primera Categoría?", options: ["a) Hasta 4 horas.", "b) Hasta 10 horas semanales.", "c) Un cargo completo.", "d) Sin límite."], correct: 1, retro: "Retroalimentación: La capacidad de acumulación aumenta con la categoría [33]." },
            { q: "40. ¿A quiénes se les prohíbe la acumulación de cargos en el servicio fiscal?", options: ["a) Maestros solteros.", "b) No jefes de familia o con rentas comerciales.", "c) Menos de 20 años de servicio.", "d) Turnos nocturnos."], correct: 1, retro: "Retroalimentación: Se prioriza el beneficio para quienes sostienen un hogar [34]." },
            { q: "41. ¿Qué se entiende por 'jefe de familia' para efectos del reglamento?", options: ["a) Persona casada.", "b) Quien tenga por lo menos un hijo menor a cargo.", "c) Quien mantenga padres.", "d) Mayor de 40 años."], correct: 1, retro: "Retroalimentación: Define la responsabilidad económica sobre menores [34]." },
            { q: "42. ¿Qué garantiza la 'inamovilidad docente'?", options: ["a) No traslado de ciudad.", "b) No destitución ni suspensión sin proceso previo y sentencia.", "c) Aumento automático.", "d) Jubilación libre."], correct: 1, retro: "Retroalimentación: Es la garantía de estabilidad laboral frente a arbitrariedades [35]." },
            { q: "43. ¿Qué derecho tiene un maestro cesante sin culpabilidad?", options: ["a) 50% por un año.", "b) 100% de su haber hasta por 90 días.", "c) 10 sueldos.", "d) Elegir nuevo trabajo."], correct: 1, retro: "Retroalimentación: El Estado protege el salario mientras se asigna nuevo destino [36]." },
            { q: "44. ¿A qué edad se dispone el retiro obligatorio (jubilación)?", options: ["a) A los 55 años.", "b) Al cumplir los 60 años.", "c) 30 años de servicio.", "d) Solicitud del director."], correct: 1, retro: "Retroalimentación: Es la edad límite establecida, salvo excepciones [37]." },
            { q: "45. ¿Cómo se acredita legalmente el tiempo de servicios?", options: ["a) Testimonio de colegas.", "b) Certificados de Contraloría u oficinas pagadoras.", "c) Carnet de identidad.", "d) Fotos de registros."], correct: 1, retro: "Retroalimentación: Solo los registros de pago oficiales validan la antigüedad [38]." },
            { q: "46. ¿Para qué efectos legales se toman en cuenta las asignaciones por categoría?", options: ["a) Jubilación, aguinaldo y beneficios sociales.", "b) Solo sueldo base.", "c) Solo bonos transporte.", "d) Ningún efecto externo."], correct: 0, retro: "Retroalimentación: La categoría se consolida en todos los derechos económicos [39]." },
            { q: "47. ¿Qué requisito deben cumplir normalistas rurales para pasar al servicio urbano?", options: ["a) 15 años en el campo.", "b) Servir 5 años en campo y aprobar dos últimos cursos de Normales Urbanas.", "c) Pagar tasa.", "d) Servicio militar."], correct: 1, retro: "Retroalimentación: Exige nivelación académica y tiempo de servicio previo [24]." },
            { q: "48. ¿Cuál es el plazo máximo para que un normalista recabe su Título y Visación?", options: ["a) 6 meses.", "b) 2 años tras egreso.", "c) 1 año.", "d) Al jubilarse."], correct: 1, retro: "Retroalimentación: El incumplimiento impide el ascenso de categoría [24]." },
            { q: "49. ¿En qué periodo se deben renovar las fichas de méritos cada año?", options: ["a) Diciembre.", "b) Al finalizar cada periodo anual.", "c) Julio.", "d) Elecciones sindicales."], correct: 1, retro: "Retroalimentación: Las autoridades deben actualizar los méritos anualmente [40]." },
            { q: "50. ¿Quién es la máxima autoridad encargada de la ejecución de este Reglamento?", options: ["a) Director Departamental.", "b) Ministro de Educación y Bellas Artes.", "c) Junta de Padres.", "d) Contralor General."], correct: 1, retro: "Retroalimentación: El decreto delega la responsabilidad legal al Ministro del área [41]." }
        ];

        const quizContainer = document.getElementById('quiz');
        const resumenFinal = document.getElementById('resultado-final');
        let aciertos = 0;
        const respuestas = {};

        function actualizarResumen() {
            const totalPreguntas = (typeof questions !== 'undefined' ? questions : quizData).length;
            const porcentaje = totalPreguntas ? (aciertos / totalPreguntas) * 100 : 0;
            resumenFinal.style.display = 'block';
            resumenFinal.innerHTML = `Porcentaje de acertividad: ${porcentaje.toFixed(2)}%<br>Aciertos: ${aciertos} / ${totalPreguntas}`;
        }

        function registrarRespuesta(qIdx, esCorrecta) {
            if (respuestas[qIdx] !== undefined) return;
            respuestas[qIdx] = esCorrecta;
            if (esCorrecta) {
                aciertos++;
            }
            actualizarResumen();
        }

        questions.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.innerHTML = `<div class="question-text">${item.q}</div>`;
            
            const optionsList = document.createElement('ul');
            optionsList.className = 'options';
            
            item.options.forEach((opt, optIndex) => {
                const li = document.createElement('li');
                li.innerText = opt;
                li.onclick = () => {
                checkAnswer(index, optIndex, li);
                registrarRespuesta(index, optIndex === item.correct);
            };
                optionsList.appendChild(li);
            });
            
            card.appendChild(optionsList);
            const feedbackDiv = document.createElement('div');
            feedbackDiv.id = `feedback-${index}`;
            feedbackDiv.className = 'feedback';
            card.appendChild(feedbackDiv);
            quizContainer.appendChild(card);
        });

        function checkAnswer(qIdx, selectedIdx, element) {
            const feedbackDiv = document.getElementById(`feedback-${qIdx}`);
            feedbackDiv.style.display = 'block';
            
            if (selectedIdx === questions[qIdx].correct) {
                feedbackDiv.innerText = questions[qIdx].retro;
                feedbackDiv.className = 'feedback correct';
            } else {
                feedbackDiv.innerText = "vuelve a analizar la pregunta";
                feedbackDiv.className = 'feedback incorrect';
            }
        }
    </script>
</body>
</html>
